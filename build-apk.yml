name: Build Mahiru Chat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # also lets you trigger the build manually from GitHub

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. System dependencies ────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-setuptools \
            libffi-dev libssl-dev \
            build-essential ccache \
            autoconf automake libtool \
            libltdl-dev libgl1-mesa-dev libgles2-mesa-dev

      # ── 3. Python / Buildozer ─────────────────────────────────────────────
      - name: Install Buildozer and Cython
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer cython==0.29.37

      # ── 4. Buildozer cache (speeds up repeated builds significantly) ───────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 5. Build the APK ──────────────────────────────────────────────────
      - name: Build APK
        run: buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # ── 6. Upload the APK as a downloadable artifact ──────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mahiru-chat-debug.apk
          path: bin/*.apk
          retention-days: 30
